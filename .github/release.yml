changelog:
  exclude:
    labels:
      - skip-changelog
  categories:
    - title: Features
      labels: [feature, enhancement]
    - title: Fixes
      labels: [bug, fix]
    - title: Accessibility
      labels: [accessibility]
    - title: Performance
      labels: [performance]
    - title: Documentation
      labels: [documentation]
    - title: Maintenance
      labels: [dependencies, maintenance, ci]
    - title: Other changes
      labels: ['*']
