name: tvOS Build

on:
  push:
    branches:
      - main
      - develop
      - 'release/**'
      - 'hotfix/**'
  pull_request:
    branches:
      - main
      - develop

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Validate project contracts
        run: |
          python3 scripts/validate_project.py
          swift-format lint --recursive VelyraTV VelyraTVTests Shared VelyraTopShelf

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Resolve an available tvOS Simulator
        id: simulator
        run: |
          DEVICE_ID=$(python3 - <<'PY'
          import json
          import subprocess

          data = json.loads(subprocess.check_output(["xcrun", "simctl", "list", "devices", "available", "-j"]))
          for runtime, devices in data.get("devices", {}).items():
              if "tvOS" not in runtime:
                  continue
              for device in devices:
                  if device.get("isAvailable"):
                      print(device["udid"])
                      raise SystemExit(0)
          raise SystemExit("No available tvOS Simulator found")
          PY
          )
          echo "device_id=$DEVICE_ID" >> "$GITHUB_OUTPUT"

      - name: Build and test on tvOS Simulator
        run: |
          xcodebuild \
            -project Velyra.xcodeproj \
            -scheme VelyraTV \
            -sdk appletvsimulator \
            -destination "platform=tvOS Simulator,id=${{ steps.simulator.outputs.device_id }}" \
            -enableCodeCoverage YES \
            CODE_SIGNING_ALLOWED=NO \
            test
