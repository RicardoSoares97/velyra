name: tvOS Build

on:
  push:
    branches:
      - main
      - develop
      - 'release/**'
      - 'hotfix/**'
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: tvos-build-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Verify Xcode and tvOS SDKs
        shell: bash
        run: |
          set -euo pipefail
          sw_vers
          xcodebuild -version
          xcodebuild -showsdks | tee "$RUNNER_TEMP/xcode-sdks.txt"
          grep -q 'appletvos' "$RUNNER_TEMP/xcode-sdks.txt"
          grep -q 'appletvsimulator' "$RUNNER_TEMP/xcode-sdks.txt"

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Expose Xcode toolchain utilities
        shell: bash
        run: |
          set -euo pipefail
          SWIFT_FORMAT_BIN=$(xcrun --find swift-format)
          SWIFT_FORMAT_DIR=$(dirname "$SWIFT_FORMAT_BIN")
          printf '%s\n' "$SWIFT_FORMAT_DIR" >> "$GITHUB_PATH"

      - name: Validate, test, and package tvOS
        run: scripts/ci_validate_tvos.sh

      - name: Upload unsigned sideload artifacts
        if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: Velyra-sideload-${{ github.sha }}
          path: |
            artifacts/Velyra-sideload.ipa
            artifacts/Velyra-sideload.ipa.sha256
          if-no-files-found: error
          retention-days: 14
          compression-level: 0
