name: Velyra
options:
  bundleIdPrefix: pt.ricardosoares
  deploymentTarget:
    tvOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 0.1.0

schemes:
  VelyraTV:
    build:
      targets:
        VelyraTV: all
    run:
      config: Debug
    archive:
      config: Release

targets:
  VelyraTV:
    type: application
    platform: tvOS
    deploymentTarget: "17.0"
    sources:
      - path: VelyraTV
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: pt.ricardosoares.velyra
        PRODUCT_NAME: Velyra
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: VelyraTV/Resources/Info.plist
        CODE_SIGN_STYLE: Automatic
        ENABLE_USER_SCRIPT_SANDBOXING: YES
    info:
      path: VelyraTV/Resources/Info.plist
      properties:
        CFBundleDisplayName: Velyra
        CFBundleName: Velyra
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        UILaunchScreen: {}
        UIUserInterfaceStyle: Automatic
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
