name: Velyra
options:
  bundleIdPrefix: pt.ricardosoares
  deploymentTarget:
    tvOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    CURRENT_PROJECT_VERSION: 2
    MARKETING_VERSION: 0.1.1
    TRAKT_CLIENT_ID: ""
    TRAKT_CLIENT_SECRET: ""
    TMDB_READ_ACCESS_TOKEN: ""

schemes:
  VelyraTV:
    build:
      targets:
        VelyraTV: all
        VelyraTVTests: [test]
    test:
      targets:
        - VelyraTVTests
      environmentVariables:
        VELYRA_TEST_HOST: "1"
    run:
      config: Debug
    archive:
      config: Release

  VelyraTVSideload:
    build:
      targets:
        VelyraTVSideload: all
    run:
      config: Debug
    archive:
      config: Release

targets:
  VelyraTV:
    type: application
    platform: tvOS
    deploymentTarget: "17.0"
    sources:
      - path: VelyraTV
        excludes:
          - Resources
      - path: Shared
      - path: VelyraTV/Resources/Assets.xcassets
        buildPhase: resources
      - path: VelyraTV/Resources/Localizable.xcstrings
        buildPhase: resources
      - path: VelyraTV/Resources/PrivacyInfo.xcprivacy
        buildPhase: resources
      - path: VelyraTV/Resources/Media
        excludes:
          - README.md
        buildPhase: resources
    dependencies:
      - target: VelyraTopShelf
        embed: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: pt.ricardosoares.velyra
        PRODUCT_NAME: Velyra
        PRODUCT_MODULE_NAME: VelyraTV
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: VelyraTV/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: VelyraTV/Resources/VelyraTV.entitlements
        CODE_SIGN_STYLE: Automatic
        ENABLE_USER_SCRIPT_SANDBOXING: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

  VelyraTVSideload:
    type: application
    platform: tvOS
    deploymentTarget: "17.0"
    sources:
      - path: VelyraTV
        excludes:
          - Resources
      - path: Shared
      - path: VelyraTV/Resources/Assets.xcassets
        buildPhase: resources
      - path: VelyraTV/Resources/Localizable.xcstrings
        buildPhase: resources
      - path: VelyraTV/Resources/PrivacyInfo.xcprivacy
        buildPhase: resources
      - path: VelyraTV/Resources/Media
        excludes:
          - README.md
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: pt.ricardosoares.velyra.sideload
        PRODUCT_NAME: Velyra
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: VelyraTV/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: VelyraTV/Resources/VelyraTVSideload.entitlements
        CODE_SIGN_STYLE: Automatic
        ENABLE_USER_SCRIPT_SANDBOXING: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_ACTIVE_COMPILATION_CONDITIONS: "$(inherited) VELYRA_SIDELOAD"

  VelyraTopShelf:
    type: app-extension
    platform: tvOS
    deploymentTarget: "17.0"
    sources:
      - path: VelyraTopShelf
        excludes:
          - Info.plist
          - VelyraTopShelf.entitlements
      - path: Shared
      - path: VelyraTV/Resources/Localizable.xcstrings
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: pt.ricardosoares.velyra.topshelf
        PRODUCT_NAME: VelyraTopShelf
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: VelyraTopShelf/Info.plist
        CODE_SIGN_ENTITLEMENTS: VelyraTopShelf/VelyraTopShelf.entitlements
        SKIP_INSTALL: YES

  VelyraTVTests:
    type: bundle.unit-test
    platform: tvOS
    deploymentTarget: "17.0"
    sources:
      - path: VelyraTVTests
    dependencies:
      - target: VelyraTV
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: pt.ricardosoares.velyra.tests
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Velyra.app/Velyra"
